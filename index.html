<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA Primary Meta Tags -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta
      name="description"
      content="Gerencie seu time de Pokémon e acompanhe sua jornada"
    />
    <meta name="theme-color" content="#FF4500" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%vite.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="%BASE_URL%icon-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="%BASE_URL%icon-512.png"
    />

    <!-- Apple Touch Icons (iOS) -->
    <link rel="apple-touch-icon" href="%BASE_URL%icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="PokeDash" />

    <!-- Microsoft Tiles (Windows) -->
    <meta name="msapplication-TileColor" content="#FF4500" />
    <meta name="msapplication-TileImage" content="%BASE_URL%icon-192.png" />
    <meta name="msapplication-config" content="none" />

    <title>PokeDash - Pokémon Journey Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="%BASE_URL%src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      // Registra o Service Worker para PWA
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          const swPath = "%BASE_URL%sw.js";
          navigator.serviceWorker
            .register(swPath)
            .then((registration) => {
              console.log(
                "✅ Service Worker registrado com sucesso:",
                registration.scope,
              );

              // Verifica se há atualizações
              registration.addEventListener("updatefound", () => {
                const newWorker = registration.installing;
                console.log("🔄 Nova versão do Service Worker encontrada");

                newWorker.addEventListener("statechange", () => {
                  if (
                    newWorker.state === "installed" &&
                    navigator.serviceWorker.controller
                  ) {
                    console.log(
                      "🆕 Nova versão disponível! Recarregue a página para atualizar.",
                    );
                    // Você pode adicionar uma notificação aqui para o usuário
                  }
                });
              });
            })
            .catch((error) => {
              console.error("❌ Erro ao registrar Service Worker:", error);
            });
        });

        // Detecta quando o app está pronto para ser instalado
        let deferredPrompt;
        window.addEventListener("beforeinstallprompt", (e) => {
          console.log("🚀 App pronto para instalação!");
          // Previne o mini-infobar no Chrome (Android)
          e.preventDefault();
          // Armazena o evento para uso posterior
          deferredPrompt = e;

          // Você pode mostrar um botão customizado de instalação aqui
          // Exemplo: showInstallButton();
        });

        // Detecta quando o app foi instalado
        window.addEventListener("appinstalled", () => {
          console.log("✅ PWA instalado com sucesso!");
          deferredPrompt = null;
        });
      } else {
        console.warn("⚠️ Service Workers não são suportados neste navegador");
      }
    </script>
  </body>
</html>
